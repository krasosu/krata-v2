services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: krata-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  krata:
    build: .
    container_name: krata-app
    ports:
      - "8080:8080"
    environment:
      S3_BASE_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      SPRING_PROFILES_ACTIVE: prod
      LUCENE_INDEX_PATH: /app/data/lucene-index
      LUCENE_STORE_CONTENT_FOR_HIGHLIGHT: "true"
    depends_on:
      - minio
    restart: on-failure
    volumes:
      - ./lucene-index:/app/data

volumes:
  minio-data:
