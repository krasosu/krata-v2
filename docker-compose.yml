services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: krata-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  krata:
    build: .
    container_name: krata-app
    ports:
      - "8080:8080"
    environment:
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      - minio
    restart: on-failure
    volumes:
      - lucene-index:/app/data

volumes:
  minio-data:
  lucene-index:
