spring:
  application:
    name: krata

# S3-kompatibler Storage (MinIO/Ceph/etc.)
s3:
  # Erlaubter Endpoint für Objekt-URLs, z.B. http://minio:9000 oder https://s3.example.tld
  base-url: ${S3_BASE_URL:}
  access-key: ${S3_ACCESS_KEY:minioadmin}
  secret-key: ${S3_SECRET_KEY:minioadmin}

# Lucene: Index persistent, RAM-Cache, Retention, Commit-Intervall
lucene:
  index-path: ./data/lucene-index
  cache:
    max-merge-size-mb: 5.0
    max-cached-mb: 60.0
  commit-interval-sec: 3
  retention-days: 30
  retention-cron: "0 0 2 * * ?"   # daily at 02:00
  store-content-for-highlight: false

# Async-Indizierung + Sicherheit
krata:
  indexing:
    queue-size: 100000
    threads: 8
    status-max-entries: 50000
    poll-timeout-sec: 5
  api-key: ${KRATA_API_KEY:}
  rate-limit:
    index-per-minute: 1000
    search-per-minute: 300

# Resilience4j Rate Limiter
resilience4j:
  ratelimiter:
    instances:
      index:
        limitForPeriod: 1000
        limitRefreshPeriod: 60s
      search:
        limitForPeriod: 300
        limitRefreshPeriod: 60s

# Actuator: Health + Metriken
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    lucene:
      enabled: true
    s3:
      enabled: true
