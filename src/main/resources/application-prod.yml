# Produktions-Profil: für Server mit ~128 GB RAM
# Redis-Queue, großer Lucene-RAM-Cache, viele Worker-Threads
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

logging:
  level:
    root: WARN
    de.krata: INFO

lucene:
  index-path: ${LUCENE_INDEX_PATH:/data/lucene-index}
  cache:
    max-merge-size-mb: 512
    max-cached-mb: 20480
  commit-interval-sec: 3
  retention-days: ${LUCENE_RETENTION_DAYS:30}
  retention-cron: "0 0 2 * * ?"
  store-content-for-highlight: false

krata:
  indexing:
    use-redis: true
    queue-size: 200000
    threads: 24
    status-max-entries: 200000
    poll-timeout-sec: 5
    redis:
      status-ttl-hours: 48
  api-key: ${KRATA_API_KEY:}
  rate-limit:
    index-per-minute: 5000
    search-per-minute: 1000

resilience4j:
  ratelimiter:
    instances:
      index:
        limitForPeriod: 5000
        limitRefreshPeriod: 60s
      search:
        limitForPeriod: 1000
        limitRefreshPeriod: 60s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
